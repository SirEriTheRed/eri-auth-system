name: Code Quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_call:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/jod'
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm run test
      - run: npx knip
